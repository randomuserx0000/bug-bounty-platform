{% extends "base.html" %}

{% block title %}crear cuenta · Escudo Digital{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>crear cuenta</h1>

    {% if google_enabled %}
        <a class="btn-google" href="/auth/google">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.08-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.26c-.8.54-1.83.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33C2.45 15.98 5.48 18 9 18z" fill="#34A853"/>
                <path d="M3.97 10.71c-.18-.54-.28-1.11-.28-1.71s.1-1.17.28-1.71V4.96H.96A8.997 8.997 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.33z" fill="#FBBC05"/>
                <path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.45 2.02.96 4.96L3.97 7.3C4.68 5.18 6.66 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            <span>Registrarme con Google</span>
        </a>
        <div class="auth-divider"><span>o con email</span></div>
    {% endif %}

    <form hx-post="/signup"
          hx-target="#form-feedback"
          hx-swap="innerHTML">

        <label>
            <span>email</span>
            <input type="email" name="email" required autocomplete="email">
        </label>

        <label>
            <span>handle (3-32 chars, alfanumérico)</span>
            <input type="text" name="handle" required minlength="3" maxlength="32"
                   pattern="[a-zA-Z0-9_]+" autocomplete="username">
        </label>

        <label>
            <span>contraseña (mín 10 chars)</span>
            <input type="password" name="password" required minlength="10"
                   autocomplete="new-password">
        </label>

        <div id="form-feedback" class="feedback"></div>

        <button type="submit">registrarse</button>
    </form>

    <p class="muted">
        ¿ya tienes cuenta? <a href="/login">inicia sesión</a>
    </p>
</section>
{% endblock %}
